<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Something went wrong — KioskRewards</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Figtree:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/css/kioskrewards.css" />
    <style>
        .error-card {
            max-width: 440px; margin: 4rem auto; text-align: center;
            background: var(--kr-surface); border: 2px solid var(--kr-border);
            border-radius: 20px; padding: 2.5rem 2rem; box-shadow: 0 6px 0 var(--kr-shadow);
        }
        .error-card p { color: var(--kr-muted); }
    </style>
</head>
<body>
    <div class="error-card">
        <a class="brand" href="/">Kiosk<span>Rewards</span></a>
        <h1>Something went wrong</h1>
        <p>We hit an unexpected error. Please try again in a moment.</p>
        <a class="btn-primary" href="/">Back to homepage</a>
    </div>
</body>
</html>
