name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore KioskRewards.sln

      - name: Build
        run: dotnet build KioskRewards.sln --no-restore --configuration Release

      - name: Test
        run: dotnet test KioskRewards.sln --no-build --configuration Release
