name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Java (required by SonarScanner)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install SonarScanner and coverage tool
        run: |
          dotnet tool install --global dotnet-sonarscanner
          dotnet tool install --global dotnet-coverage

      - name: Restore dependencies
        run: dotnet restore KioskRewards.sln

      - name: Begin SonarCloud analysis
        run: >
          dotnet-sonarscanner begin
          /k:"xoulios_B2B-Loyalty-Platform---Umbraco-training-project"
          /o:"xoulios"
          /d:sonar.token="$SONAR_TOKEN"
          /d:sonar.host.url="https://sonarcloud.io"
          /d:sonar.cs.vscoveragexml.reportsPaths="coverage.xml"
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Build
        run: dotnet build KioskRewards.sln --no-restore --configuration Release

      - name: Test with coverage
        run: dotnet-coverage collect "dotnet test KioskRewards.sln --no-build --configuration Release" -f xml -o "coverage.xml"

      - name: End SonarCloud analysis
        run: dotnet-sonarscanner end /d:sonar.token="$SONAR_TOKEN"
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
